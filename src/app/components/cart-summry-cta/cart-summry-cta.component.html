<ion-footer class="ion-no-border cart-summary-footer">
  <div class="p-4 bg-white shadow-top">
    <div class="flex items-center justify-between">
      <button
        class="flex items-center bg-red-600 rounded-full text-white text-lg w-full h-12"
        [routerLink]="['/', restaurantName$ | async, 'cart']"
      >
        <div
          class="flex items-center justify-center bg-red-700 rounded-full w-10 h-10 mr-3 ml-3"
        >
          {{ (paymentSummary$ | async)?.itemsCount }}
        </div>
        <span class="mx-3">View Order</span>
        <div class="grow"></div>
        <div class="flex items-center justify-center px-4">
          {{ (paymentSummary$ | async)?.total }}
          {{ (paymentSummary$ | async)?.currency }}
        </div>
      </button>
    </div>
  </div>
</ion-footer>
