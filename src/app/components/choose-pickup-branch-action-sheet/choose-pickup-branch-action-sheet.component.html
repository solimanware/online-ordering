<div>
  <div
    class="overlay fixed z-1 inset-0 bg-black/50 h-full w-full overflow-auto"
    (click)="closeActionSheet()"
  ></div>

  <div
    class="relative bottom-0 left-0 right-0 bg-white p-6 max-h-[90vh] rounded-t-2xl"
  >
    <div
      class="absolute -top-10 w-8 h-8 flex justify-center items-center right-4 z-10 cursor-pointer bg-black rounded-full"
      (click)="closeActionSheet()"
    >
      <ion-icon name="close-outline" class="text-white text-2xl"></ion-icon>
    </div>
    <div class="mb-6 flex justify-between items-center relative">
      <h1 class="text-2xl font-bold text-gray-900">Pickup at</h1>
    </div>
    <div class="mb-6">
      <ion-searchbar
        mode="md"
        placeholder="Search branches"
        class="border border-gray-200 rounded-lg"
      ></ion-searchbar>
    </div>
    @for (branch of branches; track $index) {
    <div
      (click)="selectBranch(branch)"
      class="flex items-center gap-4 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition-colors"
    >
      <img
        src="assets/images/logo.jpeg"
        alt="Branch Image"
        class="w-16 h-16 rounded-full object-cover"
      />
      <div>
        <h1 class="text-lg font-semibold text-gray-900">{{ branch.name }}</h1>
        <p class="text-sm text-gray-600 mt-1">{{ branch.address }}</p>
      </div>
    </div>
    }
  </div>
</div>
